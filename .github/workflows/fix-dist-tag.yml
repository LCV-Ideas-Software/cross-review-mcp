name: Fix npm dist-tag (one-shot)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag as latest (e.g. 1.3.0)'
        required: true
        type: string
permissions:
  contents: read
  id-token: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          scope: '@lcv-ideas-software'
      - name: Set dist-tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm dist-tag add @lcv-ideas-software/cross-review-v1@${{ inputs.version }} latest
          npm view @lcv-ideas-software/cross-review-v1 dist-tags
